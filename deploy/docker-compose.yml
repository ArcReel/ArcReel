services:
  arcreel:
    image: ghcr.io/arcreel/arcreel:latest
    # build: ../  # 本地构建时取消注释，注释掉 image 行
    ports:
      - "1241:1241"
    env_file: .env
    # Agent Bash 沙箱 (bwrap) 需要非特权 user namespace，放开 docker 默认 profile
    security_opt:
      - seccomp:unconfined
      - apparmor:unconfined
    volumes:
      - ./.env:/app/.env
      - ./projects:/app/projects
      - ./vertex_keys:/app/vertex_keys
      - ./claude_data:/root/.claude
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:1241/health"]
      interval: 30s
      timeout: 5s
      retries: 3
