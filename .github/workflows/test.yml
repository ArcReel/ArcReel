name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg mediainfo bubblewrap socat

      - name: Install dependencies
        run: uv sync

      - name: Lint & format check
        run: uv run ruff check . && uv run ruff format --check .

      - name: Run tests with coverage
        run: uv run python -m pytest -m "not e2e" --cov=lib --cov=server --cov-report=term-missing --cov-report=xml --cov-fail-under=80

  session-store-postgres:
    runs-on: ubuntu-latest
    needs: backend-tests
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: arcreel
          POSTGRES_PASSWORD: arcreel
          POSTGRES_DB: arcreel_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Run alembic migrations
        env:
          DATABASE_URL: postgresql+asyncpg://arcreel:arcreel@localhost:5432/arcreel_test
        run: uv run alembic upgrade head

      - name: Run dialect-sensitive tests against Postgres
        env:
          DATABASE_URL: postgresql+asyncpg://arcreel:arcreel@localhost:5432/arcreel_test
        run: |
          uv run python -m pytest \
            tests/agent_session_store/ \
            tests/test_agent_credential_repo.py \
            -v -m "not sqlite_only"

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Type check
        working-directory: frontend
        run: pnpm typecheck

      - name: Lint
        working-directory: frontend
        run: pnpm lint

      - name: Build
        working-directory: frontend
        run: pnpm build

      - name: Run tests
        working-directory: frontend
        run: pnpm test:coverage
