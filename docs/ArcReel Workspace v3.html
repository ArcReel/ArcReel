    :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 6px; }
    .display-serif { font-family: var(--font-display); }

    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }

        cost: { storyboardEst: 0.001, videoEst: 0.40, storyboardAct: null, videoAct: null },
      },

    // ---------- Status helper ----------
    function statusOf(shot) {
      const s = shot.generated_assets?.status;
      if (s === 'completed') return 'ready';
      if (s === 'storyboard_ready') return 'storyboard';
      return 'pending';
    }

    // ---------- Sidebar (episode-focused) ----------
    function Sidebar({ activeNav, onNav, activeEp, onSelectEp }) {
      const [search, setSearch] = useState('');
      const [collapsed, setCollapsed] = useState(false);

      const sections = [
        { key:'overview', label:'项目概览', icon: Icons.layers },
        { key:'script', label:'源文件', icon: Icons.bookOpen },
        { key:'characters', label:'角色集', icon: Icons.users, meta:10 },
        { key:'scenes', label:'场景库', icon: Icons.scene, meta:11 },
        { key:'props', label:'道具库', icon: Icons.box, meta:13 },
      ];

      return (
        <aside style={{
          width: collapsed ? 64 : 256,
          transition: 'width .18s ease',
          borderRight:'1px solid var(--hairline)',
          background:'linear-gradient(180deg, oklch(0.195 0.011 265 / 0.6), oklch(0.175 0.010 265 / 0.5))',
          display:'flex', flexDirection:'column', overflow:'hidden',
          boxShadow:'inset -1px 0 0 oklch(1 0 0 / 0.015)',
        }}>
          {/* Workspace sections (not per-character; those live on a dedicated page) */}
          <div style={{padding:'10px 10px 6px'}}>
            {sections.map(s => {
              const active = activeNav===s.key;
              return (
              <button key={s.key}
                onClick={()=>onNav(s.key)}
                title={collapsed ? s.label : ''}
                style={{
                  display:'flex', alignItems:'center', gap:10, width:'100%',
                  padding:'6px 9px', borderRadius:7, marginBottom:1,
                  background: active ? 'linear-gradient(90deg, var(--accent-soft), var(--accent-dim) 70%, transparent)' : 'transparent',
                  color: active ? 'var(--text)' : 'var(--text-2)',
                  position:'relative',
                  transition:'background .12s',
                }}
                onMouseEnter={e=>{ if(!active) e.currentTarget.style.background='oklch(0.26 0.012 265 / 0.5)'; }}
                onMouseLeave={e=>{ if(!active) e.currentTarget.style.background='transparent'; }}
              >
                {active && <span style={{position:'absolute', left:-1, top:7, bottom:7, width:2, borderRadius:2, background:'var(--accent)', boxShadow:'0 0 8px var(--accent-glow)'}}/>}
                <span style={{color: active ? 'var(--accent-2)' : 'var(--text-3)', flexShrink:0, width:16, display:'grid', placeItems:'center'}}>{s.icon}</span>
                {!collapsed && <>
                  <span style={{flex:1, textAlign:'left', fontSize:13, fontWeight: active ? 600 : 500, letterSpacing:-0.05}}>{s.label}</span>
                  {s.meta != null && (
                    <span className="num" style={{fontSize:10.5, color: active?'var(--text-3)':'var(--text-4)', padding:'1px 5px', borderRadius:3, background: active?'oklch(0 0 0 / 0.2)':'transparent'}}>{s.meta}</span>
                  )}
                </>}
              </button>
            );})}
          </div>

          <div style={{height:1, background:'var(--hairline-soft)', margin:'4px 14px'}}/>

          {/* Episodes */}
          {!collapsed ? (
            <>
              <div style={{padding:'10px 14px 6px', display:'flex', alignItems:'center', gap:8}}>
                <span style={{fontSize:10.5, fontWeight:700, letterSpacing:0.8, color:'var(--text-4)', textTransform:'uppercase'}}>分集</span>
                <span className="num" style={{fontSize:10, color:'var(--text-4)'}}>{EPISODES.length}</span>
                <span style={{flex:1}}/>
                <button style={{width:20, height:20, borderRadius:4, display:'grid', placeItems:'center', color:'var(--text-3)', background:'oklch(0.28 0.012 250 / 0.6)'}}>{Icons.plus}</button>
              </div>

              <div style={{padding:'0 10px 8px'}}>
                <div style={{
                  display:'flex', alignItems:'center', gap:7, padding:'5px 9px', borderRadius:7,
                  background:'oklch(0.16 0.010 250 / 0.6)', border:'1px solid var(--hairline)',
                }}>
                  <span style={{color:'var(--text-4)'}}>{Icons.search}</span>
                  <input value={search} onChange={e=>setSearch(e.target.value)}
                    placeholder="搜索集名或编号…"
                    style={{flex:1, fontSize:12, color:'var(--text)', minWidth:0}}/>
                </div>
              </div>

              <div style={{flex:1, overflowY:'auto', padding:'0 8px 10px'}}>
                {EPISODES.filter(e => !search || e.title.includes(search) || String(e.n).includes(search)).map(ep => (
                  <EpisodeItem key={ep.n} ep={ep} active={ep.n===activeEp} onClick={()=>onSelectEp(ep.n)} />
                ))}
              </div>
            </>
          ) : (
            <div style={{flex:1, overflowY:'auto', padding:'6px 10px'}}>
              {EPISODES.map(ep => (
                <button key={ep.n} onClick={()=>onSelectEp(ep.n)} title={`E${ep.n} · ${ep.title}`}
                  style={{
                    display:'flex', alignItems:'center', justifyContent:'center', width:'100%', height:36,
                    borderRadius:7, marginBottom:3,
                    background: ep.n===activeEp ? 'var(--accent-dim)' : 'transparent',
                    color: ep.n===activeEp ? 'var(--accent-2)' : 'var(--text-3)',
                    fontFamily:'var(--font-mono)', fontSize:11, fontWeight:600,
                  }}>E{ep.n}</button>
              ))}
            </div>
          )}

          {/* Footer / collapse */}
          <div style={{
            padding:'8px 10px', borderTop:'1px solid var(--hairline)',
            display:'flex', alignItems:'center', gap:8,
            background:'oklch(0.17 0.010 250 / 0.6)',
          }}>
            <button onClick={()=>setCollapsed(c=>!c)} style={{
              width:28, height:28, borderRadius:6, display:'grid', placeItems:'center',
              color:'var(--text-3)', background:'oklch(0.24 0.012 250 / 0.5)',
            }}>{collapsed ? Icons.chevronRight : Icons.back}</button>

          </div>
        </aside>
      );
    }

    function EpisodeItem({ ep, active, onClick }) {
      const statusColor = {
        done: 'oklch(0.74 0.08 155)',
        active: 'var(--accent)',
        draft: 'oklch(0.60 0.02 250)',
        idea: 'oklch(0.46 0.01 250)',
      }[ep.status];
      const statusLabel = {
        done: '已完成', active: '制作中', draft: '草稿', idea: '构思',
      }[ep.status];

      return (
        <button onClick={onClick} style={{
          display:'grid', gridTemplateColumns:'auto 1fr auto', gap:10, alignItems:'center',
          width:'100%', padding:'8px 10px', borderRadius:8, marginBottom:3,
          background: active ? 'linear-gradient(180deg, oklch(0.26 0.018 290 / 0.55), oklch(0.22 0.015 280 / 0.4))' : 'transparent',
          border: active ? '1px solid var(--accent-soft)' : '1px solid transparent',
          boxShadow: active ? '0 0 0 1px var(--accent-soft), 0 4px 12px -6px oklch(0 0 0 / 0.5), inset 0 1px 0 oklch(1 0 0 / 0.04)' : 'none',
          textAlign:'left', position:'relative',
          transition:'background .12s, border-color .12s',
        }}
        onMouseEnter={e=>{ if(!active) e.currentTarget.style.background='oklch(0.24 0.012 265 / 0.4)'; }}
        onMouseLeave={e=>{ if(!active) e.currentTarget.style.background='transparent'; }}
        >
          <div style={{
            width:34, height:34, borderRadius:6, flexShrink:0,
            background: active
              ? `linear-gradient(135deg, var(--accent) 0%, oklch(0.45 0.12 285) 100%)`
              : 'linear-gradient(180deg, oklch(0.28 0.013 265), oklch(0.24 0.012 265))',
            display:'flex', alignItems:'center', justifyContent:'center', position:'relative',
            fontFamily:'var(--font-mono)', fontSize:11, fontWeight:700, lineHeight:1, whiteSpace:'nowrap',
            color: active ? 'oklch(0.14 0 0)' : 'var(--text-3)',
            boxShadow: active
              ? 'inset 0 1px 0 oklch(1 0 0 / 0.25), 0 0 0 1px oklch(1 0 0 / 0.12), 0 2px 6px -2px var(--accent-glow)'
              : 'inset 0 1px 0 oklch(1 0 0 / 0.04), inset 0 0 0 1px var(--hairline-soft)',
          }}>{`E${ep.n}`}</div>

          <div style={{minWidth:0}}>
            <div style={{
              fontSize:13, fontWeight: active?600:500, color: active ? 'var(--text)' : 'var(--text-2)',
              whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis',
            }}>{ep.title}</div>
            <div style={{display:'flex', alignItems:'center', gap:6, marginTop:3}}>
              <span style={{display:'inline-flex', alignItems:'center', gap:4, fontSize:10.5, color:'var(--text-4)'}}>
                <span style={{width:5, height:5, borderRadius:3, background:statusColor,
                  animation: ep.status==='active'?'pulse 1.8s infinite':'none'}}/>
                {statusLabel}
              </span>
              {ep.shots > 0 && (
                <>
                  <span style={{width:2, height:2, background:'var(--hairline)', borderRadius:1}}/>
                  <span className="num" style={{fontSize:10.5, color:'var(--text-4)'}}>{ep.shots} · {Math.floor(ep.dur/60)}:{String(ep.dur%60).padStart(2,'0')}</span>
                </>
              )}
            </div>
            {ep.progress != null && (
              <div style={{height:2, borderRadius:1, background:'oklch(0.22 0.010 265)', marginTop:5, overflow:'hidden'}}>
                <div style={{width:`${ep.progress}%`, height:'100%', background:'linear-gradient(90deg, var(--accent), var(--accent-2))', boxShadow:'0 0 6px var(--accent-glow)'}}/>
              </div>
            )}
          </div>

          {ep.cost && <span className="num" style={{fontSize:10.5, color: active?'var(--accent-2)':'var(--text-4)', alignSelf:'start', paddingTop:2}}>${ep.cost.toFixed(2)}</span>}
        </button>
      );
    }

    // ---------- Episode header ----------
    function EpisodeHeader({ ep }) {
      return (
        <div style={{
          padding:'18px 24px 16px', borderBottom:'1px solid var(--hairline)',
          background:'linear-gradient(180deg, oklch(0.22 0.014 290 / 0.4), oklch(0.20 0.012 250 / 0.15))',
          display:'flex', alignItems:'flex-end', justifyContent:'space-between', gap:20, flexWrap:'wrap',
        }}>
          <div style={{minWidth:0, flex:'1 1 240px'}}>
            <div style={{display:'flex', alignItems:'center', gap:10, marginBottom:8, flexWrap:'wrap'}}>
              <span style={{
                fontSize:10.5, fontWeight:600, letterSpacing:0.8, color:'var(--accent-2)', textTransform:'uppercase',
                padding:'2px 8px', borderRadius:4, background:'var(--accent-dim)',
                fontFamily:'var(--font-mono)',
              }}>EP · {String(ep.n).padStart(2,'0')}</span>
              <span className="num" style={{fontSize:11, color:'var(--text-4)'}}>{ep.shots} 片段 · ~{ep.dur}s</span>
              <span style={{width:3, height:3, background:'var(--hairline)', borderRadius:2}} />
              <span style={{display:'inline-flex', alignItems:'center', gap:5, fontSize:11, color:'var(--text-3)'}}>
                <span style={{width:5, height:5, borderRadius:3, background:'var(--accent)', animation:'pulse 1.8s infinite'}}/>
                制作中 · {ep.progress}%
              </span>
            </div>
            <h1 className="display-serif" style={{margin:0, fontSize:26, fontWeight:500, letterSpacing:-0.4, lineHeight:1.15, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis'}}>{ep.title}</h1>
          </div>

          <div style={{display:'flex', gap:0, alignItems:'stretch', flexShrink:0}}>
            {[
              { k:'预估', v:'$2.01', meta:'5×($0.001+$0.40)' },
              { k:'已花', v:'$0.40', meta:'1 视频 · 2 分镜' },
              { k:'剩余', v:'$1.61', accent:true },
            ].map((s, i) => (
              <div key={s.k} style={{padding:'6px 14px', borderLeft: i===0?'none':'1px solid var(--hairline-soft)', minWidth: 88}}>
                <div style={{fontSize:10, color:'var(--text-4)', textTransform:'uppercase', letterSpacing:0.8, fontWeight:600}}>{s.k}</div>
                <div className="num" style={{fontSize:14, fontWeight:600, marginTop:2, color: s.accent ? 'var(--accent-2)' : 'var(--text)'}}>{s.v}</div>
                {s.meta && <div className="num" style={{fontSize:10.5, color:'var(--text-4)', marginTop:1}}>{s.meta}</div>}
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ---------- Shot content building blocks ----------
    function PlaceholderImage({ label, aspect = '3/4', seed=1, loading=false }) {
      const hue = 220 + seed * 20;
      return (
        <div style={{
          aspectRatio: aspect, width:'100%', position:'relative',
          background: `linear-gradient(135deg, oklch(0.38 0.05 ${hue}), oklch(0.18 0.02 ${hue+40}))`,
          borderRadius: 8, overflow:'hidden', display:'grid', placeItems:'center',
          boxShadow:'inset 0 0 0 1px oklch(1 0 0 / 0.05)',
        }}>
          <div style={{position:'absolute', inset:0, backgroundImage:'repeating-linear-gradient(45deg, oklch(1 0 0 / 0.025) 0 6px, transparent 6px 16px)'}}/>
          <div style={{position:'absolute', inset:0, background:'radial-gradient(circle at 30% 30%, oklch(1 0 0 / 0.08), transparent 50%)'}}/>
          {loading && (
            <div style={{position:'absolute', inset:0,
              background:'linear-gradient(90deg, transparent, oklch(1 0 0 / 0.08), transparent)',
              backgroundSize:'200% 100%', animation:'shimmer 1.8s linear infinite'}}/>
          )}
          <div style={{fontFamily:'var(--font-mono)', fontSize:10, color:'oklch(0.95 0 0 / 0.5)', letterSpacing:1, textAlign:'center', padding:8, position:'relative'}}>{label}</div>
        </div>
      );
    }

    function StatusBadge({ status }) {
      const config = {
        ready: { label:'已完成', color:'var(--good)', bg:'oklch(0.74 0.08 155 / 0.12)' },
        storyboard: { label:'分镜就绪', color:'var(--accent-2)', bg:'var(--accent-dim)' },
        pending: { label:'待生成', color:'var(--text-4)', bg:'oklch(0.30 0.01 250 / 0.4)' },
      }[status] || { label:'—', color:'var(--text-4)', bg:'transparent' };
      return (
        <span style={{
          display:'inline-flex', alignItems:'center', gap:5,
          padding:'2px 7px', borderRadius:4, fontSize:10.5, fontWeight:500,
          color: config.color, background: config.bg,
          border:'1px solid transparent',
        }}>
          <span style={{width:5, height:5, borderRadius:3, background:config.color}}/>
          {config.label}
        </span>
      );
    }

    // ---------- Split view (only layout) ----------
    function ShotSplitView({ shots }) {
      const [selected, setSelected] = useState(1);
      const shot = shots[selected];
      const [activeV, setActiveV] = useState(Math.max(1, shot.storyboard_versions || 1));
      const [activeVid, setActiveVid] = useState(1);
      const [listCollapsed, setListCollapsed] = useState(() => typeof window !== 'undefined' && window.innerWidth < 1100);
      // keep version in sync when switching shot
      useEffect(()=>{ setActiveV(Math.max(1, shot.storyboard_versions || 1)); setActiveVid(1); }, [selected]);

      if (listCollapsed) {
        return (
          <div style={{display:'grid', gridTemplateColumns:'44px 1fr', height:'100%', overflow:'hidden', minWidth:0}}>
            <div style={{
              borderRight:'1px solid var(--hairline)',
              background:'oklch(0.19 0.011 265 / 0.5)',
              display:'flex', flexDirection:'column', alignItems:'center', padding:'10px 0', gap:6, overflowY:'auto',
            }}>
              <button onClick={()=>setListCollapsed(false)} title="展开分镜列表" style={{
                width:28, height:28, borderRadius:6, display:'grid', placeItems:'center',
                background:'oklch(0.24 0.012 265 / 0.5)', border:'1px solid var(--hairline-soft)', color:'var(--text-3)',
              }}>{Icons.chevronRight}</button>
              <div style={{fontSize:9.5, fontWeight:700, letterSpacing:1.2, color:'var(--text-4)', textTransform:'uppercase', writingMode:'vertical-rl', transform:'rotate(180deg)', marginTop:6}}>SHOTS · {shots.length}</div>
              <div style={{flex:1, display:'flex', flexDirection:'column', gap:4, alignItems:'center', marginTop:4}}>
                {shots.map((s, i) => (
                  <button key={s.id} onClick={()=>setSelected(i)} title={s.id} style={{
                    width:28, height:28, borderRadius:5,
                    fontFamily:'var(--font-mono)', fontSize:9.5, fontWeight:700,
                    color: i===selected ? 'oklch(0.14 0 0)' : 'var(--text-3)',
                    background: i===selected ? 'linear-gradient(180deg, var(--accent-2), var(--accent))' : 'oklch(0.22 0.011 265 / 0.5)',
                    border:'1px solid var(--hairline-soft)',
                  }}>{s.id.replace('E1','').replace('U','U')}</button>
                ))}
              </div>
            </div>
            <ShotDetail key={shot.id} shot={shot} activeV={activeV} setActiveV={setActiveV}
              activeVid={activeVid} setActiveVid={setActiveVid}
              selected={selected} count={shots.length}
              onPrev={()=>setSelected(i=>Math.max(0,i-1))}
              onNext={()=>setSelected(i=>Math.min(shots.length-1,i+1))} />
          </div>
        );
      }

      return (
        <div style={{display:'grid', gridTemplateColumns:'260px minmax(0, 1fr)', height:'100%', overflow:'hidden', minWidth:0}}>
          {/* Shot list */}
          <div style={{
            borderRight:'1px solid var(--hairline)',
            background:'linear-gradient(180deg, oklch(0.19 0.011 265 / 0.5), oklch(0.17 0.010 265 / 0.35))',
            overflowY:'auto', padding:'12px 10px', minWidth:0,
          }}>
            <div style={{display:'flex', alignItems:'center', gap:8, padding:'4px 8px 8px'}}>
              <span style={{fontSize:10.5, fontWeight:700, letterSpacing:0.8, color:'var(--text-4)', textTransform:'uppercase'}}>分镜</span>
              <span className="num" style={{fontSize:10, color:'var(--text-4)'}}>{shots.length}</span>
              <span style={{flex:1}}/>
              <button onClick={()=>setListCollapsed(true)} title="折叠" style={{fontSize:11, color:'var(--text-4)', padding:'3px 5px', borderRadius:4}}>‹</button>
              <button style={{fontSize:11, color:'var(--text-3)', display:'inline-flex', alignItems:'center', gap:4, padding:'3px 7px', borderRadius:4, background:'oklch(0.24 0.012 265 / 0.5)', border:'1px solid var(--hairline-soft)'}}>
                {Icons.plus}<span>添加</span>
              </button>
            </div>

            <div style={{padding:'0 4px 10px'}}>
              <div style={{
                display:'flex', alignItems:'center', gap:6,
                padding:'5px 9px', borderRadius:6,
                background:'oklch(0.20 0.011 265 / 0.55)',
                border:'1px solid var(--hairline-soft)',
              }}>
                <span style={{color:'var(--text-4)', display:'inline-grid', placeItems:'center'}}>{Icons.search}</span>
                <input
                  placeholder="搜索分镜…"
                  style={{
                    flex:1, minWidth:0, fontSize:11.5, color:'var(--text-2)',
                    background:'transparent', border:'none', outline:'none',
                    fontFamily:'var(--font-sans)',
                  }}
                />
              </div>
            </div>

            {shots.map((s, i) => (
              <button key={s.id} onClick={()=>setSelected(i)} style={{
                display:'grid', gridTemplateColumns:'auto 1fr auto', gap:10, alignItems:'center',
                width:'100%', padding:'8px', borderRadius:8, marginBottom:3,
                background: i===selected ? 'linear-gradient(180deg, oklch(0.26 0.018 290 / 0.5), oklch(0.22 0.015 280 / 0.35))' : 'transparent',
                border: i===selected ? '1px solid var(--accent-soft)' : '1px solid transparent',
                boxShadow: i===selected ? '0 0 0 1px var(--accent-soft), 0 4px 12px -6px oklch(0 0 0 / 0.4)' : 'none',
                textAlign:'left', position:'relative',
              }}
              onMouseEnter={e=>{ if(i!==selected) e.currentTarget.style.background='oklch(0.24 0.012 265 / 0.4)'; }}
              onMouseLeave={e=>{ if(i!==selected) e.currentTarget.style.background='transparent'; }}
              >
                {i===selected && <span style={{position:'absolute', left:-1, top:8, bottom:8, width:2, borderRadius:2, background:'var(--accent)', boxShadow:'0 0 8px var(--accent-glow)'}}/>}
                <div style={{width:48, height:64, borderRadius:5, overflow:'hidden', position:'relative', flexShrink:0}}>
                  <PlaceholderImage label="" aspect="3/4" seed={i+1} loading={false}/>
                  <div style={{position:'absolute', bottom:2, left:3, right:3, display:'flex', alignItems:'center', justifyContent:'space-between'}}>
                    <span style={{fontFamily:'var(--font-mono)', fontSize:9, fontWeight:700, color:'oklch(0.98 0 0)', textShadow:'0 1px 2px oklch(0 0 0 / 0.8)'}}>{s.id.replace('E1','').replace('U','U')}</span>
                  </div>
                </div>
                <div style={{minWidth:0}}>
                  <div style={{fontSize:12, color: i===selected?'var(--text)':'var(--text-2)', fontWeight: i===selected?600:500, lineHeight:1.4,
                    display:'-webkit-box', WebkitLineClamp:2, WebkitBoxOrient:'vertical', overflow:'hidden',
                  }}>{s.novel_text}</div>
                  <div style={{display:'flex', alignItems:'center', gap:6, marginTop:4}}>
                    <StatusBadge status={statusOf(s)}/>
                    <span className="num" style={{fontSize:10, color:'var(--text-4)'}}>{s.dur}s</span>
                    {s.storyboard_versions > 0 && <span className="num" style={{fontSize:10, color:'var(--text-4)'}}>· V{s.storyboard_versions}</span>}
                  </div>
                </div>
              </button>
            ))}
          </div>

          {/* Detail — three columns */}
          <ShotDetail key={shot.id} shot={shot} activeV={activeV} setActiveV={setActiveV}
            activeVid={activeVid} setActiveVid={setActiveVid}
            selected={selected} count={shots.length}
            onPrev={()=>setSelected(i=>Math.max(0,i-1))}
            onNext={()=>setSelected(i=>Math.min(shots.length-1,i+1))} />
        </div>
      );
    }

    // ---------- Reference chip + avatar ----------
    function RefAvatar({ refItem: ref, size=28, withLabel=false, removable=false, onRemove }) {
      if (!ref) return null;
      const k = REF_KIND[ref.kind];
      return (
        <div style={{display:'inline-flex', alignItems:'center', gap:6}}>
          <div style={{
            width:size, height:size, borderRadius: ref.kind==='character' ? size/2 : 6,
            background:`linear-gradient(135deg, oklch(0.42 0.08 ${ref.hue}), oklch(0.22 0.04 ${ref.hue+30}))`,
            position:'relative', flexShrink:0,
            boxShadow:`inset 0 0 0 1px oklch(1 0 0 / 0.08), 0 0 0 1.5px ${k.dot} inset`,
            display:'grid', placeItems:'center',
            fontSize: Math.max(9, size*0.38), color:'oklch(0.98 0 0 / 0.8)',
            fontFamily:'var(--font-mono)', fontWeight:700, letterSpacing:0.3,
          }}>
            {ref.name.slice(0,1)}
            <span style={{position:'absolute', bottom:-1, right:-1, width:7, height:7, borderRadius:4, background:k.dot, boxShadow:'0 0 0 1.5px var(--bg)'}}/>
          </div>
          {withLabel && (
            <span style={{fontSize:11.5, color:'var(--text-2)', fontWeight:500}}>{ref.name}</span>
          )}
          {removable && (
            <button onClick={onRemove} style={{color:'var(--text-4)', fontSize:14, lineHeight:1, padding:'0 2px'}}>×</button>
          )}
        </div>
      );
    }

    // ---------- Reference picker (popover-style inline) ----------
    function RefPicker({ onPick, existing=[] }) {
      const [q, setQ] = useState('');
      const groups = [['character','角色'],['scene','场景'],['prop','道具']];
      return (
        <div style={{
          width: 260, padding:10, borderRadius:10,
          background:'oklch(0.19 0.013 265 / 0.95)', backdropFilter:'blur(14px)',
          border:'1px solid var(--hairline-strong)', boxShadow:'0 18px 40px -12px oklch(0 0 0 / 0.7)',
        }}>
          <div style={{display:'flex', alignItems:'center', gap:6, padding:'5px 8px', borderRadius:6,
            background:'oklch(0.15 0.010 265 / 0.7)', border:'1px solid var(--hairline)', marginBottom:8}}>
            <span style={{color:'var(--text-4)'}}>{Icons.search}</span>
            <input value={q} onChange={e=>setQ(e.target.value)} placeholder="搜索角色 / 场景 / 道具" style={{flex:1, fontSize:11.5}}/>
          </div>
          <div style={{maxHeight:260, overflowY:'auto'}}>
            {groups.map(([kind,label]) => {
              const items = REFS.filter(r => r.kind===kind && (!q || r.name.includes(q)));
              if (!items.length) return null;
              return (
                <div key={kind} style={{marginBottom:8}}>
                  <div style={{fontSize:9.5, fontWeight:700, color:'var(--text-4)', letterSpacing:1, textTransform:'uppercase', padding:'4px 6px', fontFamily:'var(--font-mono)'}}>{label} · {items.length}</div>
                  {items.map(r => {
                    const used = existing.includes(r.id);
                    return (
                      <button key={r.id} onClick={()=>onPick(r)} disabled={used}
                        style={{
                          display:'flex', alignItems:'center', gap:8, width:'100%', padding:'5px 6px', borderRadius:5,
                          background: used ? 'oklch(0.22 0.011 265 / 0.4)' : 'transparent',
                          opacity: used ? 0.5 : 1,
                        }}
                        onMouseEnter={e=>{ if(!used) e.currentTarget.style.background='oklch(0.26 0.013 265 / 0.7)'; }}
                        onMouseLeave={e=>{ if(!used) e.currentTarget.style.background='transparent'; }}>
                        <RefAvatar refItem={r} size={22}/>
                        <span style={{flex:1, textAlign:'left', fontSize:12, color:'var(--text-2)'}}>{r.name}</span>
                        {used && <span style={{fontSize:10, color:'var(--text-4)'}}>已添加</span>}
                      </button>
                    );
                  })}
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function ShotDetail({ shot, activeV, setActiveV, activeVid, setActiveVid, selected, count, onPrev, onNext }) {
      const status = statusOf(shot);
      const isEmpty = status === 'pending' && shot.storyboard_versions === 0;
      const [notes, setNotes] = useState(shot.notes || '');
      const [notesOpen, setNotesOpen] = useState(false);
      useEffect(()=>{ setNotes(shot.notes || ''); }, [shot.id]);
      const ip = shot.image_prompt || { scene:'', composition:{} };
      const vp = shot.video_prompt || { action:'', dialogue:[] };

      return (
        <div style={{overflow:'hidden', display:'flex', flexDirection:'column', minHeight:0, minWidth:0, height:'100%', background:'radial-gradient(ellipse at top, oklch(0.20 0.012 270 / 0.35), oklch(0.17 0.010 265 / 0.2))'}}>
          {/* Detail header */}
          <div style={{
            display:'flex', alignItems:'center', gap:10, padding:'12px 20px',
            borderBottom:'1px solid var(--hairline-soft)', position:'relative',
          }}>
            <span style={{
              fontFamily:'var(--font-mono)', fontSize:12, fontWeight:700,
              padding:'4px 11px', borderRadius:6,
              background:'linear-gradient(180deg, var(--accent-2), var(--accent))',
              color:'oklch(0.14 0 0)', letterSpacing:0.3,
              boxShadow:'inset 0 1px 0 oklch(1 0 0 / 0.3), 0 2px 6px -2px var(--accent-glow)',
            }}>{shot.id}</span>
            <span style={{display:'inline-flex', alignItems:'center', gap:5, fontSize:11.5, color:'var(--text-2)', padding:'3px 9px', borderRadius:5, background:'oklch(0.22 0.011 265 / 0.6)', border:'1px solid var(--hairline-soft)'}}>
              <span style={{color:'var(--text-4)'}}>⏱</span>
              <span className="num">{shot.dur}s</span>
            </span>
            <StatusBadge status={status}/>
            <span style={{fontSize:11.5, color:'var(--text-3)', display:'inline-flex', alignItems:'center', gap:5}}>
              <span style={{color:'var(--text-4)'}}>·</span>
              <span>{shot.scene_type}</span>
            </span>
            <span style={{flex:1}}/>
            <div style={{display:'flex', alignItems:'center', gap:6}}>
              <span className="num" style={{fontSize:10.5, color:'var(--text-4)'}}>{selected+1} / {count}</span>
              <button className="sv-navbtn" onClick={onPrev}>←</button>
              <button className="sv-navbtn" onClick={onNext}>→</button>
              <button
                className="sv-navbtn"
                onClick={()=>setNotesOpen(o=>!o)}
                title="备注"
                style={{
                  padding:'4px 8px', display:'inline-flex', alignItems:'center', gap:5, position:'relative',
                  color: notesOpen ? 'var(--accent-2)' : (notes ? 'var(--text-2)' : 'var(--text-3)'),
                  background: notesOpen ? 'var(--accent-dim)' : (notes ? 'oklch(0.24 0.012 265 / 0.7)' : 'oklch(0.22 0.011 265 / 0.5)'),
                  borderColor: notesOpen ? 'var(--accent-soft)' : 'var(--hairline)',
                }}
              >
                {Icons.note}
                {notes && !notesOpen && (
                  <span style={{
                    position:'absolute', top:2, right:2, width:5, height:5, borderRadius:3,
                    background:'var(--accent)', boxShadow:'0 0 4px var(--accent-glow)',
                  }}/>
                )}
              </button>
            </div>
            {notesOpen && (
              <>
                <div
                  onClick={()=>setNotesOpen(false)}
                  style={{position:'fixed', inset:0, zIndex:30}}
                />
                <div style={{
                  position:'absolute', top:'calc(100% + 6px)', right:14, zIndex:31,
                  width:340, maxWidth:'calc(100vw - 32px)',
                  padding:12,
                  background:'linear-gradient(180deg, oklch(0.21 0.012 265 / 0.98), oklch(0.18 0.010 265 / 0.98))',
                  border:'1px solid var(--hairline)', borderRadius:10,
                  boxShadow:'0 24px 60px -20px oklch(0 0 0 / 0.7), 0 0 0 1px var(--hairline-soft)',
                  backdropFilter:'blur(12px)',
                }}>
                  <div style={{display:'flex', alignItems:'center', gap:6, marginBottom:8}}>
                    <span style={{color:'var(--text-3)', display:'inline-grid', placeItems:'center'}}>{Icons.note}</span>
                    <span style={{fontSize:11, fontWeight:700, letterSpacing:0.8, color:'var(--text-3)', textTransform:'uppercase', fontFamily:'var(--font-mono)'}}>备注</span>
                    <span style={{flex:1}}/>
                    <span className="num" style={{fontSize:10, color:'var(--text-4)'}}>{notes.length}</span>
                    <button
                      onClick={()=>setNotesOpen(false)}
                      style={{
                        width:20, height:20, borderRadius:4, color:'var(--text-4)',
                        display:'grid', placeItems:'center', fontSize:14, lineHeight:1,
                      }}
                    >×</button>
                  </div>
                  <textarea
                    value={notes}
                    onChange={e=>setNotes(e.target.value)}
                    autoFocus
                    placeholder={`关于 ${shot.id} 的备注：参考、修改方向、TODO…`}
                    style={{
                      width:'100%', minHeight:140, resize:'vertical',
                      padding:'10px 12px', fontSize:12.5, lineHeight:1.55,
                      color:'var(--text-2)', background:'oklch(0.16 0.010 265 / 0.6)',
                      border:'1px solid var(--hairline-soft)', borderRadius:7,
                      fontFamily:'var(--font-sans)', outline:'none',
                    }}
                  />
                </div>
              </>
            )}
          </div>

          {/* Three columns — responsive */}
          <ResponsiveDetailGrid>
            {/* Col 1 — Dialog + Notes */}
            <div data-col="left" style={{overflowY:'auto', padding:'14px 14px 20px', display:'flex', flexDirection:'column', gap:16, minHeight:0}}>
              <div>
                <div style={{fontSize:10.5, fontWeight:700, color:'var(--text-4)', letterSpacing:1, textTransform:'uppercase', marginBottom:8, fontFamily:'var(--font-mono)'}}>对话</div>
                {vp.dialogue?.length ? (
                  <div style={{display:'flex', flexDirection:'column', gap:8}}>
                    {vp.dialogue.map((d, i)=>(
                      <div key={i} style={{padding:'8px 10px', borderRadius:7, background:'oklch(0.20 0.011 265 / 0.5)', border:'1px solid var(--hairline-soft)'}}>
                        <div style={{display:'flex', alignItems:'center', gap:6, marginBottom:4}}>
                          <span style={{fontSize:11, fontWeight:600, color:'var(--accent-2)'}}>{d.speaker}</span>
                        </div>
                        <div className="display-serif" style={{fontSize:12.5, lineHeight:1.55, color:'var(--text-2)'}}>{d.line}</div>
                      </div>
                    ))}
                    <button style={{fontSize:11, color:'var(--text-3)', padding:'6px 0', borderRadius:5, border:'1px dashed var(--hairline)', background:'transparent'}}>+ 添加对话</button>
                  </div>
                ) : (
                  <div style={{padding:'14px 10px', borderRadius:7, border:'1px dashed var(--hairline)', textAlign:'center', color:'var(--text-4)', fontSize:11.5, fontStyle:'italic'}}>
                    （暂无对话）
                  </div>

              </div>

              <div>
                <div style={{fontSize:10.5, fontWeight:700, color:'var(--text-4)', letterSpacing:1, textTransform:'uppercase', marginBottom:8, fontFamily:'var(--font-mono)'}}>原文</div>
                <div style={{padding:'10px 12px', background:'linear-gradient(180deg, oklch(0.22 0.012 265 / 0.5), oklch(0.20 0.012 265 / 0.35))', border:'1px solid var(--hairline-soft)', borderLeft:`3px solid oklch(0.62 0.09 ${shot.hue})`, borderRadius:7}}>
                  <p className="display-serif" style={{margin:0, fontSize:13, lineHeight:1.65, color:'var(--text)'}}>{shot.novel_text}</p>
                </div>
              </div>
            </div>

            {/* Col 2 — Prompts */}
            <div data-col="mid" style={{overflowY:'auto', padding:'14px 20px 28px', minWidth:0, minHeight:0}}>
              {isEmpty ? (
                <div style={{padding:'60px 20px', textAlign:'center'}}>
                  <div style={{color:'var(--text-4)', fontSize:13, marginBottom:16}}>这一镜还没有生成提示词。</div>
                  <button style={{
                    padding:'8px 14px', borderRadius:7, fontSize:12.5, fontWeight:600,
                    color:'oklch(0.14 0 0)', background:'linear-gradient(180deg, var(--accent-2), var(--accent))',
                    display:'inline-flex', gap:6, alignItems:'center',
                    boxShadow:'inset 0 1px 0 oklch(1 0 0 / 0.3), 0 4px 14px -4px var(--accent-glow)',
                  }}>{Icons.sparkle}<span>智能生成提示词</span></button>
                </div>
              ) : <>
                <div style={{fontSize:10.5, fontWeight:700, color:'var(--text-4)', letterSpacing:1, textTransform:'uppercase', marginBottom:10, fontFamily:'var(--font-mono)'}}>提示词</div>

                <PromptSection icon={Icons.grid} title="Image Prompt · 分镜图" actions={<span className="num" style={{fontSize:10, color:'var(--text-4)'}}>{(ip.scene||'').length} 字</span>}>
                  <textarea defaultValue={ip.scene} className="prompt-ta" placeholder="描述这一镜的画面：环境、人物、动作、构图细节…" style={{minHeight:124}}/>
                </PromptSection>

                <Collapsible title="composition · 构图" defaultOpen>
                  <FieldRow label="shot_type">
                    <Pill value={`${ip.composition?.shot_type || ''} · ${SHOT_TYPE_ZH[ip.composition?.shot_type] || ''}`} suffix={Icons.chevronDown}/>
                  </FieldRow>
                  <FieldRow label="lighting">
                    <InputCell value={ip.composition?.lighting || ''}/>
                  </FieldRow>
                  <FieldRow label="ambiance">
                    <InputCell value={ip.composition?.ambiance || ''}/>
                  </FieldRow>
                </Collapsible>

                <div style={{height:14}}/>

                <PromptSection icon={Icons.film} title="Video Prompt · 视频" actions={<span className="num" style={{fontSize:10, color:'var(--text-4)'}}>{(vp.action||'').length} 字</span>}>
                  <textarea defaultValue={vp.action} className="prompt-ta" placeholder="描述这一镜的动作演变：从分镜图开始如何运动…" style={{minHeight:88}}/>
                </PromptSection>

                <Collapsible title="运镜 / 音效 / 对话" defaultOpen>
                  <FieldRow label="camera_motion">
                    <Pill value={`${vp.camera_motion || 'Static'} · ${CAM_ZH[vp.camera_motion] || ''}`} suffix={Icons.chevronDown}/>
                  </FieldRow>
                  <FieldRow label="ambiance_audio">
                    <InputCell value={vp.ambiance_audio || ''}/>
                  </FieldRow>
                  <FieldRow label="dialogue">
                    <div style={{display:'flex', flexDirection:'column', gap:6}}>
                      {(vp.dialogue||[]).map((d,i)=>(
                        <div key={i} style={{display:'flex', alignItems:'center', gap:6, padding:'5px 8px', borderRadius:5, background:'oklch(0.20 0.011 265 / 0.5)', border:'1px solid var(--hairline-soft)', fontSize:11.5}}>
                          <span style={{color:'var(--accent-2)', fontWeight:600, flexShrink:0}}>{d.speaker}</span>
                          <span style={{color:'var(--text-3)', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>{d.line}</span>
                        </div>
                      ))}
                      <button style={{fontSize:11.5, color:'var(--text-3)', padding:'5px 10px', borderRadius:5, border:'1px dashed var(--hairline)', background:'transparent', textAlign:'left'}}>+ 添加台词</button>
                    </div>
                  </FieldRow>
                </Collapsible>
              </>}
            </div>

            {/* Col 3 — Image + Video */}
            <div data-col="right" style={{overflowY:'auto', padding:'14px 18px 28px', display:'flex', flexDirection:'column', gap:16, minHeight:0}}>
              {/* Image card */}
              <div>
                <div style={{display:'flex', alignItems:'center', gap:6, marginBottom:8}}>
                  <span style={{color:'var(--text-3)'}}>{Icons.grid}</span>
                  <span style={{fontSize:12, fontWeight:600, color:'var(--text-2)'}}>分镜图</span>
                  <span style={{flex:1}}/>
                  {shot.storyboard_versions > 0 && (
                    <button className="sv-navbtn" style={{display:'inline-flex', alignItems:'center', gap:4, padding:'3px 8px'}}>
                      <span style={{color:'var(--text-4)'}}>⟳</span>
                      <span>版本</span>
                      <span style={{color:'var(--text-4)'}}>›</span>
                    </button>
                  )}
                </div>
                {shot.storyboard_versions > 0 ? (
                  <>
                    <div style={{position:'relative', borderRadius:10, overflow:'hidden', boxShadow:'0 16px 40px -16px oklch(0 0 0 / 0.7), 0 0 0 1px var(--hairline)'}}>
                      <PlaceholderImage label={`${shot.id} · V${activeV}`} aspect="3/4" seed={selected*3+activeV} loading={false}/>
                      <div style={{position:'absolute', top:8, left:8, right:8, display:'flex', gap:5, alignItems:'center'}}>
                        <div style={{display:'inline-flex', gap:2, background:'oklch(0.08 0 0 / 0.55)', padding:3, borderRadius:5, backdropFilter:'blur(10px)', border:'1px solid oklch(1 0 0 / 0.08)'}}>
                          {Array.from({length:shot.storyboard_versions}).map((_,i)=>(
                            <button key={i} onClick={()=>setActiveV(i+1)} className="num" style={{
                              minWidth:22, height:18, padding:'0 6px', borderRadius:3, fontSize:10.5,
                              color: activeV===i+1 ? 'oklch(0.14 0 0)' : 'oklch(0.95 0 0 / 0.85)',
                              background: activeV===i+1 ? 'linear-gradient(180deg, var(--accent-2), var(--accent))' : 'transparent',
                              boxShadow: activeV===i+1 ? 'inset 0 1px 0 oklch(1 0 0 / 0.3)' : 'none',
                              fontWeight:600,
                            }}>V{i+1}</button>
                          ))}
                        </div>
                        <span style={{flex:1}}/>
                        <button style={{width:26, height:26, borderRadius:5, background:'oklch(0.08 0 0 / 0.55)', color:'oklch(0.95 0 0)', border:'1px solid oklch(1 0 0 / 0.08)', display:'grid', placeItems:'center', backdropFilter:'blur(10px)'}}>{Icons.expand}</button>
                      </div>
                    </div>
                  </>
                ) : (
                  <div style={{aspectRatio:'3/4', borderRadius:10, border:'1px dashed var(--hairline)', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:8, background:'oklch(0.18 0.010 265 / 0.4)'}}>
                    <div style={{color:'var(--text-4)'}}>{Icons.grid}</div>
                    <div style={{fontSize:11.5, color:'var(--text-4)'}}>尚未生成</div>
                  </div>
                )}
                <button style={{
                  marginTop:10, width:'100%',
                  padding:'10px 14px', borderRadius:8, fontSize:13, fontWeight:600,
                  color:'oklch(0.14 0 0)',
                  background:'linear-gradient(180deg, var(--accent-2), var(--accent))',
                  display:'inline-flex', alignItems:'center', justifyContent:'center', gap:6,
                  boxShadow:'inset 0 1px 0 oklch(1 0 0 / 0.3), 0 4px 14px -4px var(--accent-glow)',
                }}>{Icons.wand}<span>{shot.storyboard_versions>0?'重新生成分镜':'生成分镜'}</span><span className="num" style={{fontSize:11, opacity:0.7, marginLeft:4}}>~${(shot.cost?.storyboardEst ?? 0.001).toFixed(3)}</span></button>
              </div>

              {/* Video card */}
              <div>
                <div style={{display:'flex', alignItems:'center', gap:6, marginBottom:8}}>
                  <span style={{color:'var(--text-3)'}}>{Icons.film}</span>
                  <span style={{fontSize:12, fontWeight:600, color:'var(--text-2)'}}>视频</span>
                  <span style={{flex:1}}/>
                  {shot.video_versions > 0 && (
                    <button className="sv-navbtn" style={{display:'inline-flex', alignItems:'center', gap:4, padding:'3px 8px'}}>
                      <span style={{color:'var(--text-4)'}}>⟳</span>
                      <span>版本</span>
                      <span style={{color:'var(--text-4)'}}>›</span>
                    </button>
                  )}
                </div>
                {shot.video_versions > 0 ? (
                  <div style={{position:'relative', borderRadius:10, overflow:'hidden', boxShadow:'0 16px 40px -16px oklch(0 0 0 / 0.7), 0 0 0 1px var(--hairline)'}}>
                    <PlaceholderImage label="" aspect="3/4" seed={selected*7+1}/>
                    <div style={{position:'absolute', inset:0, background:'radial-gradient(circle at center, transparent 40%, oklch(0 0 0 / 0.3))', display:'grid', placeItems:'center'}}>

    // ---------- Responsive 3-column detail grid ----------
    function ResponsiveDetailGrid({ children }) {
      const [w, setW] = useState(0);
      const roRef = useRef(null);
      const setRef = React.useCallback((el) => {
        if (roRef.current) { roRef.current.disconnect(); roRef.current = null; }
        if (!el) return;
        setW(el.getBoundingClientRect().width);
        const ro = new ResizeObserver(entries => {
          for (const e of entries) setW(e.contentRect.width);
        });
        ro.observe(el);
        roRef.current = ro;
      }, []);

      // Breakpoints:
      //  >= 980: classic 3 cols (left | mid | right)
      //  640-979: 2 cols — left as tab, mid + right side by side (mid becomes a tab-picker)
      //  < 640: single column stacked
      const narrow = w < 980;
      const tight = w < 640;

      const [activeTab, setActiveTab] = useState('mid'); // left | mid
      const kids = React.Children.toArray(children);
      const byCol = { left: null, mid: null, right: null };
      kids.forEach(k => { const key = k.props?.['data-col']; if (key) byCol[key] = k; });

      if (!narrow) {
        return (
          <div ref={setRef} style={{flex:1, overflow:'hidden', display:'grid', gridTemplateColumns:'220px minmax(280px,1fr) 340px', minHeight:0}}>
            {React.cloneElement(byCol.left, { style:{...byCol.left.props.style, borderRight:'1px solid var(--hairline-soft)'} })}
            {byCol.mid}
            {React.cloneElement(byCol.right, { style:{...byCol.right.props.style, borderLeft:'1px solid var(--hairline-soft)'} })}
          </div>
        );
      }

      if (tight) {
        // Stacked — tabs to pick which col
        const tabs = [
          { k:'left', label:'剧本 / 对话' },
          { k:'mid',  label:'提示词' },
          { k:'right',label:'分镜 / 视频' },
        ];
        return (
          <div ref={setRef} style={{flex:1, overflow:'hidden', display:'flex', flexDirection:'column', minHeight:0}}>
            <div style={{display:'flex', gap:2, padding:'8px 12px', borderBottom:'1px solid var(--hairline-soft)', background:'oklch(0.20 0.011 265 / 0.3)'}}>
              {tabs.map(x => (
                <button key={x.k} onClick={()=>setActiveTab(x.k)} style={{
                  padding:'6px 12px', fontSize:11.5, fontWeight:500, borderRadius:6,
                  color: activeTab===x.k ? 'var(--accent-2)' : 'var(--text-3)',
                  background: activeTab===x.k ? 'var(--accent-dim)' : 'transparent',
                  border: activeTab===x.k ? '1px solid var(--accent-soft)' : '1px solid transparent',
                }}>{x.label}</button>
              ))}
            </div>
            <div style={{flex:1, minHeight:0, overflow:'hidden', display:'flex', flexDirection:'column'}}>
              {byCol[activeTab] && React.cloneElement(byCol[activeTab], { style:{...byCol[activeTab].props.style, flex:1, minHeight:0, height:'auto'} })}
            </div>
          </div>
        );
      }

      // narrow (640–979): mid + right side by side; left as drawer tab
      const leftOpen = activeTab === 'left';
      return (
        <div ref={setRef} style={{flex:1, overflow:'hidden', display:'flex', flexDirection:'column', minHeight:0}}>
          <div style={{display:'flex', alignItems:'center', gap:6, padding:'6px 12px', borderBottom:'1px solid var(--hairline-soft)', background:'oklch(0.20 0.011 265 / 0.3)'}}>
            <button onClick={()=>setActiveTab(leftOpen?'mid':'left')} style={{
              padding:'5px 10px', fontSize:11.5, fontWeight:500, borderRadius:6,
              color: leftOpen ? 'var(--accent-2)' : 'var(--text-3)',
              background: leftOpen ? 'var(--accent-dim)' : 'oklch(0.22 0.011 265 / 0.5)',
              border: '1px solid ' + (leftOpen ? 'var(--accent-soft)' : 'var(--hairline-soft)'),
              display:'inline-flex', alignItems:'center', gap:5,
            }}>{leftOpen?'×':'☰'} 剧本 / 对话 / 备注</button>
            <span style={{flex:1}}/>
          </div>
          <div style={{flex:1, minHeight:0, display:'grid', gridTemplateColumns: leftOpen ? '260px minmax(0,1fr)' : 'minmax(0,1fr) 300px', overflow:'hidden'}}>
            {leftOpen
              ? <>{React.cloneElement(byCol.left, { style:{...byCol.left.props.style, borderRight:'1px solid var(--hairline-soft)'} })}{byCol.mid}</>
              : <>{byCol.mid}{React.cloneElement(byCol.right, { style:{...byCol.right.props.style, borderLeft:'1px solid var(--hairline-soft)'} })}</>
            }
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
