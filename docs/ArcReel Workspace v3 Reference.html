/* ---------- Highlighted prompt textarea (mention coloring) ---------- */
const MENTION_RE = /@([\u4e00-\u9fff\w][\u4e00-\u9fff\w·]*)/g;
function tokenize(text) {
  const out = [];
  let last = 0;
  const re = new RegExp(MENTION_RE);
  let m;
  while ((m = re.exec(text)) !== null) {
    if (m.index > last) out.push({ kind: 'text', text: text.slice(last, m.index) });
    const name = m[1];
    const r = REF_BY_NAME[name];
    out.push({ kind: 'mention', text: m[0], name, refType: r ? r.kind : 'unknown' });
    last = m.index + m[0].length;
  }
  if (last < text.length) out.push({ kind: 'text', text: text.slice(last) });
  return out;
}

function HighlightedPromptEditor({ value, onChange, onFocus }) {
  const taRef = useRef(null);
  const preRef = useRef(null);
  const tokens = useMemo(() => tokenize(value), [value]);

  const onScroll = () => {
    if (preRef.current && taRef.current) {
      preRef.current.scrollTop = taRef.current.scrollTop;
      preRef.current.scrollLeft = taRef.current.scrollLeft;
    }
  };

  return (
    <div style={{ position: 'relative', flex: 1, minHeight: 0,
      borderRadius: 8, border: '1px solid var(--hairline)',
      background: 'linear-gradient(180deg, oklch(0.16 0.010 265 / 0.7), oklch(0.14 0.009 265 / 0.55))',
      boxShadow: 'inset 0 1px 2px oklch(0 0 0 / 0.25)'
    }}>
          <pre ref={preRef} aria-hidden style={{
        position: 'absolute', inset: 0, margin: 0, padding: 14,
        fontFamily: 'var(--font-mono)', fontSize: 13, lineHeight: 1.65,
        color: 'var(--text)',
        whiteSpace: 'pre-wrap', wordBreak: 'break-word',
        overflow: 'hidden', pointerEvents: 'none'
      }}>
            {tokens.map((t, i) => {
          if (t.kind === 'text') return <span key={i}>{t.text}</span>;
          const palette = REF_KIND[t.refType] || { color: 'var(--err)', bg: 'oklch(0.72 0.18 25 / 0.18)' };
          return (
            <span key={i} style={{
              color: palette.color, background: palette.bg,
              borderRadius: 3,
              boxShadow: `inset 0 0 0 1px ${palette.border || 'oklch(0.72 0.18 25 / 0.4)'}`,
              padding: '0 1px'
            }}>{t.text}</span>);

        })}
            {value.endsWith('\n') ? '\u200b' : null}
          </pre>
          <textarea
        ref={taRef}
        value={value}
        onChange={(e) => onChange(e.target.value)}
        onScroll={onScroll}
        onFocus={onFocus}
        spellCheck={false}
        placeholder="输入提示词，使用 @ 引用角色 / 场景 / 道具…"
        style={{
          position: 'absolute', inset: 0, width: '100%', height: '100%', resize: 'none',
          padding: 14, fontFamily: 'var(--font-mono)', fontSize: 13, lineHeight: 1.65,
          color: 'transparent', caretColor: 'var(--text)',
          background: 'transparent'
        }} />
      
        </div>);

}

/* ---------- Responsive container size hook ---------- */
function useContainerWidth() {
  const ref = useRef(null);
  const [w, setW] = useState(1200);
  useLayoutEffect(() => {
    if (!ref.current) return;
    const el = ref.current;
    const ro = new ResizeObserver((entries) => {
      for (const e of entries) setW(e.contentRect.width);
    });
    ro.observe(el);
    setW(el.getBoundingClientRect().width);
    return () => ro.disconnect();
  }, []);
  return [ref, w];
}

/* ---------- Three-pane shell ---------- */
function UnitWorkbench({ units }) {
  const [selected, setSelected] = useState(units[0].unit_id);
  const [drafts, setDrafts] = useState({}); // unit_id -> draft text (only when dirty)
  const [refsOverride, setRefsOverride] = useState({}); // unit_id -> references array (when modified)
  const [savingId, setSavingId] = useState(null);
  const [generatingIds, setGeneratingIds] = useState(() => new Set(units.filter((u) => u.task_status === 'running').map((u) => u.unit_id)));

  const unit = units.find((u) => u.unit_id === selected) || units[0];
  const baseText = unit.shots.map((s, i) => `Shot ${i + 1} (${s.duration}s): ${s.text}`).join('\n');
  const value = drafts[unit.unit_id] !== undefined ? drafts[unit.unit_id] : baseText;
  const refs = refsOverride[unit.unit_id] || unit.references;

  const dirty = drafts[unit.unit_id] !== undefined && drafts[unit.unit_id] !== baseText;
  const dirtyMap = useMemo(() => {
    const m = {};
    Object.entries(drafts).forEach(([id, txt]) => {
      const u = units.find((x) => x.unit_id === id);
      if (!u) return;
      const base = u.shots.map((s, i) => `Shot ${i + 1} (${s.duration}s): ${s.text}`).join('\n');
      if (txt !== base) m[id] = true;
    });
    return m;
  }, [drafts, units]);

  const generating = generatingIds.has(unit.unit_id);
  const effectiveStatus = generating ? 'running' : unit.task_status;
  const effectiveUnit = { ...unit, task_status: effectiveStatus, references: refs };

  const onChange = (next) => setDrafts((d) => ({ ...d, [unit.unit_id]: next }));
  const onSave = () => {
    setSavingId(unit.unit_id);
    setTimeout(() => {
      setSavingId(null);
      setDrafts((d) => {
        const c = { ...d };delete c[unit.unit_id];return c;
      });
    }, 700);
  };
  const onGenerate = () => {
    setGeneratingIds((s) => new Set([...s, unit.unit_id]));
  };
  const onAddRef = (r) => setRefsOverride((o) => ({ ...o, [unit.unit_id]: [...refs, r] }));
  const onRemoveRef = (r) => setRefsOverride((o) => ({ ...o, [unit.unit_id]: refs.filter((x) => !(x.type === r.type && x.name === r.name)) }));

  const [containerRef, cw] = useContainerWidth();
  // Breakpoints:
  //   < 880  → editor-only mode (preview becomes a slide-over from a tab),
  //            list collapses to an icon rail
  //   < 1100 → list collapses to an icon rail; preview narrows
  //   else   → full three-pane
  const listMode = cw < 1100 ? 'rail' : 'full';
  const stackPreview = cw < 880;

  const [activeDetailTab, setActiveDetailTab] = useState('editor'); // editor | preview (only used when stackPreview)
  const [listFlyoutOpen, setListFlyoutOpen] = useState(false);

  const listColW = listMode === 'rail' ? 56 : 320;
  const gridCols = stackPreview ?
  `${listColW}px minmax(0, 1fr)` :
  `${listColW}px minmax(0, 1fr) ${cw < 1280 ? 320 : 360}px`;

  return (
    <div ref={containerRef} style={{
      display: 'grid', gridTemplateColumns: gridCols,
      height: '100%', overflow: 'hidden', minWidth: 0, position: 'relative'
    }}>
          {listMode === 'full' ?
      <UnitListPane units={units} selectedId={selected} onSelect={setSelected} dirtyMap={dirtyMap} onAdd={() => {}} /> :
      <UnitRail units={units} selectedId={selected} onSelect={setSelected} dirtyMap={dirtyMap} onExpand={() => setListFlyoutOpen(true)} />}

          {listFlyoutOpen &&
      <>
              <div onClick={() => setListFlyoutOpen(false)} style={{ position: 'absolute', inset: 0, background: 'oklch(0 0 0 / 0.4)', backdropFilter: 'blur(2px)', zIndex: 40 }} />
              <div style={{ position: 'absolute', top: 0, bottom: 0, left: 0, width: 320, zIndex: 41, boxShadow: '8px 0 24px -8px oklch(0 0 0 / 0.6)' }}>
                <UnitListPane units={units} selectedId={selected} onSelect={(id) => {setSelected(id);setListFlyoutOpen(false);}} dirtyMap={dirtyMap} onAdd={() => {}} />
              </div>
            </>
      }

          <div style={{ display: 'flex', flexDirection: 'column', minWidth: 0, overflow: 'hidden',
        background: 'radial-gradient(ellipse at top, oklch(0.20 0.012 270 / 0.35), oklch(0.17 0.010 265 / 0.2))' }}>
            {/* unit header */}
            <div style={{
          display: 'flex', alignItems: 'center', gap: 10, padding: '12px 18px',
          borderBottom: '1px solid var(--hairline-soft)'
        }}>
              <span style={{
            fontFamily: 'var(--font-mono)', fontSize: 12, fontWeight: 700,
            padding: '4px 11px', borderRadius: 6,
            background: 'linear-gradient(180deg, var(--accent-2), var(--accent))',
            color: 'oklch(0.14 0 0)', letterSpacing: 0.3,
            boxShadow: 'inset 0 1px 0 oklch(1 0 0 / 0.3), 0 2px 6px -2px var(--accent-glow)'
          }}>{unit.unit_id}</span>
              <span style={{ display: 'inline-flex', alignItems: 'center', gap: 5, fontSize: 11.5, color: 'var(--text-2)', padding: '3px 9px', borderRadius: 5, background: 'oklch(0.22 0.011 265 / 0.6)', border: '1px solid var(--hairline-soft)' }}>
                {Icons.clock}<span className="num">{unit.duration_seconds}s</span>
              </span>
              <span style={{ display: 'inline-flex', alignItems: 'center', gap: 5, fontSize: 11.5, color: 'var(--text-2)', padding: '3px 9px', borderRadius: 5, background: 'oklch(0.22 0.011 265 / 0.6)', border: '1px solid var(--hairline-soft)' }}>
                {Icons.cut}<span className="num">{unit.shots.length} shot</span>
              </span>
              <StatusBadge status={effectiveStatus} />
              <span style={{ flex: 1 }} />
              <span className="num" style={{ fontSize: 10.5, color: 'var(--text-4)' }}>{units.findIndex((u) => u.unit_id === selected) + 1} / {units.length}</span>
              <button className="sv-navbtn" onClick={() => setSelected(units[Math.max(0, units.findIndex((u) => u.unit_id === selected) - 1)].unit_id)}>←</button>
              <button className="sv-navbtn" onClick={() => setSelected(units[Math.min(units.length - 1, units.findIndex((u) => u.unit_id === selected) + 1)].unit_id)}>→</button>
            </div>

            {stackPreview &&
        <div style={{
          display: 'flex', alignItems: 'center', gap: 2, padding: '0 18px',
          borderBottom: '1px solid var(--hairline)', background: 'oklch(0.19 0.012 250 / 0.4)'
        }}>
              <button onClick={() => setActiveDetailTab('editor')} style={{
                padding: '9px 14px', fontSize: 12.5, fontWeight: 500,
                color: activeDetailTab === 'editor' ? 'var(--text)' : 'var(--text-3)', position: 'relative',
                display: 'inline-flex', alignItems: 'center', gap: 6
              }}>
                {Icons.cut}<span>提示词</span>
                {activeDetailTab === 'editor' && <span style={{ position: 'absolute', bottom: -1, left: 10, right: 10, height: 2, background: 'var(--accent)', borderRadius: 2 }} />}
              </button>
              <button onClick={() => setActiveDetailTab('preview')} style={{
                padding: '9px 14px', fontSize: 12.5, fontWeight: 500,
                color: activeDetailTab === 'preview' ? 'var(--text)' : 'var(--text-3)', position: 'relative',
                display: 'inline-flex', alignItems: 'center', gap: 6
              }}>
                {Icons.film}<span>视频预览</span>
                {effectiveStatus === 'ready' && <span style={{ width: 5, height: 5, borderRadius: 3, background: 'var(--good)' }} />}
                {effectiveStatus === 'running' && <span style={{ width: 5, height: 5, borderRadius: 3, background: 'var(--warn)', animation: 'pulse 1.6s infinite' }} />}
                {effectiveStatus === 'failed' && <span style={{ width: 5, height: 5, borderRadius: 3, background: 'var(--err)' }} />}
                {activeDetailTab === 'preview' && <span style={{ position: 'absolute', bottom: -1, left: 10, right: 10, height: 2, background: 'var(--accent)', borderRadius: 2 }} />}
              </button>
            </div>
        }

            <div style={{ flex: 1, minHeight: 0, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
              {(!stackPreview || activeDetailTab === 'editor') &&
          <EditorPane
            unit={effectiveUnit}
            value={value}
            onChange={onChange}
            dirty={dirty}
            onSave={onSave}
            saving={savingId === unit.unit_id}
            onAddRef={onAddRef}
            onRemoveRef={onRemoveRef} />
          }
              {stackPreview && activeDetailTab === 'preview' &&
          <div style={{ flex: 1, minHeight: 0, display: 'flex', flexDirection: 'column', overflow: 'hidden',
            background: 'linear-gradient(180deg, oklch(0.19 0.011 265 / 0.5), oklch(0.17 0.010 265 / 0.35))' }}>
                <PreviewPane unit={effectiveUnit} onGenerate={onGenerate} generating={generating} />
              </div>
          }
            </div>
          </div>

          {/* Right preview */}
          {!stackPreview &&
      <div style={{
        borderLeft: '1px solid var(--hairline)',
        background: 'linear-gradient(180deg, oklch(0.19 0.011 265 / 0.5), oklch(0.17 0.010 265 / 0.35))',
        display: 'flex', flexDirection: 'column', minWidth: 0, overflow: 'hidden'
      }}>
              <PreviewPane unit={effectiveUnit} onGenerate={onGenerate} generating={generating} />
            </div>
      }

          <style>{`
            .sv-navbtn { font-size:11.5px; padding:4px 10px; border-radius:5px; color:var(--text-2); border:1px solid var(--hairline); background:oklch(0.22 0.011 265 / 0.5); cursor:pointer; }
            .sv-navbtn:hover { background:oklch(0.26 0.013 265 / 0.7); color:var(--text); }
          `}</style>
        </div>);

}

/* ---------- Main pane ---------- */
function MainPane({ activeEp }) {
  const ep = EPISODES.find((e) => e.n === activeEp) || EPISODES[0];
  const [tab, setTab] = useState('units');
  const [showPreproc, setShowPreproc] = useState(false);

  if (showPreproc) {
    return (
      <main style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden', minWidth: 0 }}>
            <div style={{ padding: '14px 24px', borderBottom: '1px solid var(--hairline)' }}>
              <button onClick={() => setShowPreproc(false)} style={{ display: 'inline-flex', alignItems: 'center', gap: 5, fontSize: 12, color: 'var(--text-3)', padding: '4px 8px', borderRadius: 5, background: 'oklch(0.22 0.011 265 / 0.5)' }}>
                {Icons.back}<span>返回</span>
              </button>
            </div>
            <div style={{ flex: 1, padding: '24px', maxWidth: 920, margin: '0 auto', width: '100%' }}>
              <h2 className="display-serif" style={{ fontSize: 22, fontWeight: 500, marginTop: 0 }}>E{ep.n} · 参考视频拆分预处理</h2>
              <p style={{ color: 'var(--text-3)', fontSize: 12.5, lineHeight: 1.7 }}>
                这一步把原文剧本切成视频单元（VideoUnit），每个单元会拼接成一条连续视频。每个单元可以包含一个或多个 shot，shot 之间共享引用资产。
              </p>
            </div>
          </main>);

  }

  return (
    <main style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden', minWidth: 0 }}>
          <EpisodeHeader ep={ep} units={UNITS} />

          <div style={{
        display: 'flex', alignItems: 'center', gap: 2, padding: '0 20px',
        borderBottom: '1px solid var(--hairline)', background: 'oklch(0.19 0.012 250 / 0.5)'
      }}>
            <button onClick={() => setTab('units')} style={{
          padding: '10px 14px', fontSize: 12.5, fontWeight: 500,
          color: tab === 'units' ? 'var(--text)' : 'var(--text-3)', position: 'relative'
        }}>
              视频单元
              {tab === 'units' && <span style={{ position: 'absolute', bottom: -1, left: 10, right: 10, height: 2, background: 'var(--accent)', borderRadius: 2 }} />}
            </button>
            <button onClick={() => setShowPreproc(true)} style={{
          padding: '10px 14px', fontSize: 12.5, fontWeight: 500,
          color: 'var(--text-3)', display: 'inline-flex', alignItems: 'center', gap: 5
        }}>
              拆分预处理
              <span style={{ fontSize: 9, color: 'var(--good)', display: 'inline-flex', alignItems: 'center', gap: 3 }}>
                <span style={{ width: 5, height: 5, borderRadius: 3, background: 'var(--good)' }} />已就绪
              </span>
            </button>
            <span style={{ flex: 1 }} />

            <div style={{ display: 'inline-flex', alignItems: 'center', gap: 6, marginRight: 4 }}>
              <button className="hdr-btn" style={{ display: 'inline-flex', alignItems: 'center', gap: 5 }}>{Icons.sparkle}<span>批量生成视频</span></button>
            </div>
          </div>

          <div style={{ flex: 1, overflow: 'hidden', background: 'oklch(0.18 0.011 250 / 0.25)', minHeight: 0 }}>
            <UnitWorkbench units={UNITS} />
          </div>

          <style>{`
            .hdr-btn { font-size:11.5px; padding:5px 10px; border-radius:6px; color:var(--text-2); border:1px solid var(--hairline); background:oklch(0.22 0.011 265 / 0.5); cursor:pointer; }
            .hdr-btn:hover { background:oklch(0.26 0.013 265 / 0.7); color:var(--text); }
          `}</style>
        </main>);

}

/* ---------- AI assistant pane ---------- */
function AIPane() {
  const [collapsed, setCollapsed] = useState(() => typeof window === 'undefined' ? false : window.innerWidth < 1380);
  if (collapsed) {
    return (
      <aside style={{
        width: 48, borderLeft: '1px solid var(--hairline)', flexShrink: 0,
        background: 'oklch(0.19 0.011 250 / 0.5)',
        display: 'flex', flexDirection: 'column', alignItems: 'center', padding: '10px 0', gap: 8
      }}>
            <button onClick={() => setCollapsed(false)} style={{
          width: 30, height: 30, borderRadius: 7, display: 'grid', placeItems: 'center',
          background: 'linear-gradient(135deg, var(--accent), oklch(0.60 0.10 280))',
          color: 'oklch(0.12 0 0)'
        }}>{Icons.sparkle}</button>
            <div style={{ writingMode: 'vertical-rl', transform: 'rotate(180deg)', fontSize: 10.5, color: 'var(--text-4)', letterSpacing: 1, textTransform: 'uppercase', marginTop: 8 }}>AI</div>
          </aside>);

  }
  return (
    <aside style={{
      width: 340, flexShrink: 0, display: 'flex', flexDirection: 'column',
      background: 'oklch(0.19 0.011 250 / 0.5)', borderLeft: '1px solid var(--hairline)', overflow: 'hidden'
    }}>
          <div style={{ padding: '10px 14px', borderBottom: '1px solid var(--hairline)', display: 'flex', alignItems: 'center', gap: 10 }}>
            <div style={{
          width: 24, height: 24, borderRadius: 6,
          background: 'linear-gradient(135deg, var(--accent), oklch(0.60 0.10 280))',
          display: 'grid', placeItems: 'center', color: 'oklch(0.12 0 0)'
        }}>{Icons.sparkle}</div>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontSize: 13, fontWeight: 600, lineHeight: 1.1 }}>ArcReel 智能体</div>
              <div style={{ fontSize: 10.5, color: 'var(--text-4)', lineHeight: 1.1, marginTop: 2, display: 'flex', alignItems: 'center', gap: 5 }}>
                <span style={{ width: 6, height: 6, borderRadius: 3, background: 'var(--good)', boxShadow: '0 0 8px var(--good)' }} />
                connected · claude-sonnet-4
              </div>
            </div>
            <button onClick={() => setCollapsed(true)} style={{ width: 26, height: 26, borderRadius: 5, display: 'grid', placeItems: 'center', color: 'var(--text-3)' }}>{Icons.chevronRight}</button>
          </div>

          <div style={{ flex: 1, overflowY: 'auto', padding: '12px 14px', display: 'flex', flexDirection: 'column', gap: 14 }}>
            <div style={{ fontSize: 12.5, color: 'var(--text-2)', lineHeight: 1.6 }}>
              已为 <b style={{ color: 'var(--text)' }}>E1U2</b> 生成完成 reference_videos/E1U2.mp4，选用：@总统大厅 / @哥哥飞船 / @滑膛 / @朱汉杨。
            </div>
            <div style={{ display: 'flex', justifyContent: 'flex-end' }}>
              <div style={{ maxWidth: '85%', padding: '8px 12px', borderRadius: 10, borderBottomRightRadius: 3, background: 'var(--accent-dim)', border: '1px solid var(--accent-soft)', color: 'var(--accent-2)', fontSize: 12.5 }}>
                把 E1U3 的"钻戒柔光"再加强一点
              </div>
            </div>
            <div style={{ fontSize: 12.5, color: 'var(--text-2)', lineHeight: 1.6 }}>
              已更新 <b style={{ color: 'var(--text)' }}>E1U3</b> 的提示词，正在重新生成…
            </div>
            <div style={{
          padding: '8px 10px', borderRadius: 7,
          background: 'oklch(0.20 0.011 265 / 0.5)', border: '1px solid var(--hairline-soft)',
          fontSize: 11.5, color: 'var(--text-3)'
        }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 4 }}>
                <span style={{ color: 'var(--warn)' }}>{Icons.info}</span>
                <span style={{ fontWeight: 600, color: 'var(--text-2)' }}>E1U5 失败</span>
                <span style={{ flex: 1 }} />
                <button style={{ fontSize: 10.5, color: 'var(--accent-2)' }}>重试</button>
              </div>
              <div style={{ lineHeight: 1.5 }}>reference_video provider 限流，请稍后重试。</div>
            </div>
          </div>

          <div style={{ padding: '10px 14px', borderTop: '1px solid var(--hairline)' }}>
            <div style={{ background: 'oklch(0.16 0.010 250 / 0.7)', border: '1px solid var(--hairline)', borderRadius: 10, padding: '10px 12px' }}>
              <textarea placeholder="输入消息…" rows={2}
          style={{ width: '100%', resize: 'none', fontSize: 12.5, color: 'var(--text)', fontFamily: 'var(--font-sans)', lineHeight: 1.55 }} />
              <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginTop: 6 }}>
                <button style={{ color: 'var(--text-4)', padding: 4, borderRadius: 5 }}>{Icons.attach}</button>
                <span style={{ flex: 1 }} />
                <span style={{ fontSize: 10.5, color: 'var(--text-4)', fontFamily: 'var(--font-mono)' }}>⌘⏎</span>
                <button style={{ width: 28, height: 28, borderRadius: 6, background: 'var(--accent)', color: 'oklch(0.12 0 0)', display: 'grid', placeItems: 'center' }}>{Icons.send}</button>
              </div>
            </div>
          </div>
        </aside>);

}

/* ---------- App ---------- */
function App() {
  const [activeNav, setActiveNav] = useState('overview');
  const [activeEp, setActiveEp] = useState(1);
  return (
    <>
          <TopBar />
          <div style={{ display: 'flex', overflow: 'hidden', minHeight: 0 }}>
            <Sidebar activeNav={activeNav} onNav={setActiveNav} activeEp={activeEp} onSelectEp={setActiveEp} />
            <MainPane activeEp={activeEp} />
            <AIPane />
          </div>
        </>);

}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
